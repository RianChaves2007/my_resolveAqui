<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mensagens — Resolve Aqui</title>
  <link rel="stylesheet" href="../assests/css/mensagem/mensagens.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-logo">

        <circle cx="22" cy="22" r="20" fill="#1a2f6e" stroke="#00c853" stroke-width="2.5"/>
        <path d="M14 22l6 6 10-12" stroke="#00c853" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="navbar-icons">
      <button class="nav-btn" onclick="location.href='index.html'" title="Início">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </button>
      <button class="nav-btn" title="Favoritos">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <button class="nav-btn active" title="Mensagens">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </button>
      <button class="nav-btn" title="Histórico">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </button>
      <button class="nav-btn" title="Perfil">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
    </div>
  </nav>

  <!-- BREADCRUMB -->
  <div class="breadcrumb" id="breadcrumb">
    <a href="index.html" class="bc-link">HOME</a>
    <span class="bc-sep">/</span>
    <span class="bc-cur" id="bc-cur">CONTATOS</span>
  </div>

  <!-- CORPO PRINCIPAL -->
  <div class="msg-layout">

    <!-- PAINEL ESQUERDO: CONTATOS -->
    <aside class="contatos-painel">
      <div class="contatos-header">
        <button class="btn-voltar-home" onclick="location.href='index.html'" title="Voltar ao início">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="contatos-titulo">CONTATOS</span>
      </div>

      <ul class="contatos-lista" id="contatos-lista">

        <li class="contato-item" data-user="Davi Alves" data-img="60" data-prof="Pedreiro" onclick="abrirChat(this)">
          <img class="contato-avatar" src="https://i.pravatar.cc/48?img=60" alt="Davi Alves"/>
          <div class="contato-info">
            <span class="contato-nome">Davi Alves</span>
            <span class="contato-prof">Pedreiro</span>
          </div>
          <svg class="contato-chat-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </li>

        <li class="contato-item" data-user="Gean Felipe ⭐" data-img="33" data-prof="Encanador" onclick="abrirChat(this)">
          <img class="contato-avatar" src="https://i.pravatar.cc/48?img=33" alt="Gean Felipe"/>
          <div class="contato-info">
            <span class="contato-nome">Gean Felipe ⭐</span>
            <span class="contato-prof">Encanador</span>
          </div>
          <svg class="contato-chat-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </li>

        <li class="contato-item" data-user="Sônia Borges" data-img="47" data-prof="Artesã" onclick="abrirChat(this)">
          <img class="contato-avatar" src="https://i.pravatar.cc/48?img=47" alt="Sônia Borges"/>
          <div class="contato-info">
            <span class="contato-nome">Sônia Borges</span>
            <span class="contato-prof">Artesã</span>
          </div>
          <svg class="contato-chat-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </li>

        <li class="contato-item" data-user="Fátima Soito ⭐" data-img="49" data-prof="Cozinheira" onclick="abrirChat(this)">
          <img class="contato-avatar" src="https://i.pravatar.cc/48?img=49" alt="Fátima Soito"/>
          <div class="contato-info">
            <span class="contato-nome">Fátima Soito ⭐</span>
            <span class="contato-prof">Cozinheira</span>
          </div>
          <svg class="contato-chat-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </li>

        <!-- Contato Romeu Lima (só aparece se vier via portfólio) -->
        <li class="contato-item contato-romeu" id="contato-romeu" data-user="Romeu Lima" data-img="70" data-prof="Eletricista" onclick="abrirChat(this)" style="display:none;">
          <img class="contato-avatar" src="https://i.pravatar.cc/48?img=70" alt="Romeu Lima"/>
          <div class="contato-info">
            <span class="contato-nome">Romeu Lima</span>
            <span class="contato-prof">Eletricista</span>
          </div>
          <svg class="contato-chat-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </li>

      </ul>
    </aside>

    <!-- PAINEL DIREITO: CHAT -->
    <section class="chat-painel" id="chat-painel">

      <!-- Estado vazio -->
      <div class="chat-vazio" id="chat-vazio">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>Selecione um contato para iniciar a conversa</p>
      </div>

      <!-- Área de chat ativa (oculta inicialmente) -->
      <div class="chat-ativo" id="chat-ativo" style="display:none;">

        <div class="chat-separador">
          <span class="sep-linha"></span>
          <span class="sep-texto">• Hoje •</span>
          <span class="sep-linha"></span>
        </div>

        <div class="mensagens-area" id="mensagens-area">
          <!-- mensagens injetadas por JS -->
        </div>

        <!-- Input -->
        <div class="chat-input-row">
          <button class="btn-input-voltar" onclick="fecharChat()" title="Voltar">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 14 4 9 9 4"/><line x1="4" y1="9" x2="20" y2="9"/></svg>
          </button>
          <input type="text" class="chat-input" id="chat-input" placeholder="Mensagem" onkeydown="enviarComEnter(event)"/>
          <button class="btn-enviar" onclick="enviarMensagem()" title="Enviar">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>

      </div>
    </section>

  </div>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const paramUser = params.get('user');
    const paramImg  = params.get('img');

    const convHistory = {};

    function hora() {
      const d = new Date();
      return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    function abrirChat(el) {
      const nome = el.dataset.user;
      const img  = el.dataset.img;
      const prof = el.dataset.prof;

      document.querySelectorAll('.contato-item').forEach(i => i.classList.remove('ativo'));
      el.classList.add('ativo');

      document.getElementById('chat-vazio').style.display = 'none';
      document.getElementById('chat-ativo').style.display = 'flex';

      document.getElementById('bc-cur').textContent = nome.toUpperCase();

      const area = document.getElementById('mensagens-area');
      area.innerHTML = '';

      if (!convHistory[nome]) {
        convHistory[nome] = [
          { tipo: 'recebida', texto: 'Olá! Como posso ajudar você?', hora: '13:04', img },
          { tipo: 'enviada',  texto: 'Oi! Gostaria de saber mais sobre os seus serviços.', hora: '13:17' },
          { tipo: 'enviada',  texto: 'Qual é a sua disponibilidade para esta semana?', hora: '13:18' },
          { tipo: 'recebida', texto: 'Tenho disponibilidade a partir de quinta-feira.', hora: '13:22', img },
        ];
      }

      convHistory[nome].forEach(m => renderMensagem(area, m));
      area.scrollTop = area.scrollHeight;

      window._chatAtual = { nome, img };
    }

    function renderMensagem(area, m) {
      const wrap = document.createElement('div');
      wrap.className = 'msg-wrap ' + m.tipo;

      if (m.tipo === 'recebida') {
        wrap.innerHTML = `
          <span class="msg-autor">${window._chatAtual?.nome || ''}</span>
          <div class="msg-balao recebida">${m.texto}</div>
          <span class="msg-hora">${m.hora}</span>`;
      } else {
        wrap.innerHTML = `
          <span class="msg-autor voce">Você</span>
          <div class="msg-balao enviada">${m.texto}</div>
          <span class="msg-hora">${m.hora}</span>`;
      }

      area.appendChild(wrap);
    }

    function enviarMensagem() {
      const input = document.getElementById('chat-input');
      const texto = input.value.trim();
      if (!texto || !window._chatAtual) return;

      const area = document.getElementById('mensagens-area');
      const h = hora();
      const m = { tipo: 'enviada', texto, hora: h };

      if (!convHistory[window._chatAtual.nome]) convHistory[window._chatAtual.nome] = [];
      convHistory[window._chatAtual.nome].push(m);

      renderMensagem(area, m);
      area.scrollTop = area.scrollHeight;
      input.value = '';
    }

    function enviarComEnter(e) {
      if (e.key === 'Enter') enviarMensagem();
    }

    function fecharChat() {
      document.querySelectorAll('.contato-item').forEach(i => i.classList.remove('ativo'));
      document.getElementById('chat-vazio').style.display = 'flex';
      document.getElementById('chat-ativo').style.display = 'none';
      document.getElementById('bc-cur').textContent = 'CONTATOS';
      window._chatAtual = null;
    }

    // Inicializar via query param (vindo de outro index ou portfólio)
    window.addEventListener('DOMContentLoaded', () => {
      if (paramUser) {
        const romeuEl = document.getElementById('contato-romeu');
        if (paramUser === 'Romeu Lima') {
          romeuEl.style.display = 'flex';
        }

        const todos = document.querySelectorAll('.contato-item');
        for (const el of todos) {
          if (el.dataset.user === paramUser || el.dataset.user.startsWith(paramUser.split(' ')[0])) {
            if (paramImg) el.dataset.img = paramImg;
            abrirChat(el);
            break;
          }
        }
      }
    });
  </script>

</body>
</html>
