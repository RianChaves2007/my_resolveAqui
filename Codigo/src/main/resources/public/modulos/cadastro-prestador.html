<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro Profissional — Resolve Aqui</title>
  <link rel="stylesheet" href="../assests/css/cadastro-prestador/cadastro-prestador.css" />
</head>
<body>

<div class="page">

  <!-- ═══════════════════════════════════════════════════════════════
       PAINEL ESQUERDO — dados de acesso (fundo escuro)
  ═══════════════════════════════════════════════════════════════ -->
  <div class="panel-left">

    <button class="back-btn" onclick="location.href='/modulos/cadastro.html'" title="Voltar">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#00c853" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 8 8 12 12 16"/>
        <line x1="16" y1="12" x2="8" y2="12"/>
      </svg>
    </button>

    <div id="error-msg" class="error-msg" style="display:none"></div>

    <div class="field-group">
      <label class="field-label">Nome Completo</label>
      <input class="field-input" id="inp-nome" type="text"
             placeholder="Insira seu nome completo" autocomplete="name">
    </div>

    <div class="field-group">
      <label class="field-label">Email</label>
      <input class="field-input" id="inp-email" type="email"
             placeholder="Insira seu email" autocomplete="email">
    </div>

    <div class="field-group">
      <label class="field-label">Telefone</label>
      <input class="field-input" id="inp-telefone" type="tel"
             placeholder="(00) 00000-0000" autocomplete="tel">
    </div>

    <div class="field-group">
      <label class="field-label">Senha</label>
      <div class="input-pw-wrap">
        <input class="field-input" id="inp-pw" type="password"
               placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        <button class="toggle-pw" type="button" onclick="togglePw('inp-pw', this)" aria-label="Mostrar senha">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Confirmação de senha</label>
      <div class="input-pw-wrap">
        <input class="field-input" id="inp-pw2" type="password"
               placeholder="Repita a senha" autocomplete="new-password">
        <button class="toggle-pw" type="button" onclick="togglePw('inp-pw2', this)" aria-label="Mostrar senha">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" onclick="doRegister()">Registrar</button>

  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       PAINEL DIREITO — dados profissionais (fundo claro)
  ═══════════════════════════════════════════════════════════════ -->
  <div class="panel-right">

    <!-- Foto de perfil -->
    <div class="photo-row">
      <label class="photo-btn" for="inp-foto">
        <input type="file" id="inp-foto" accept="image/*"
               style="display:none" onchange="previewFoto(this)">
        <div class="photo-circle" id="foto-preview">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none"
               stroke="rgba(255,255,255,0.8)" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <img id="foto-img" src="" alt=""
               style="display:none; width:100%; height:100%; object-fit:cover; border-radius:50%;">
        </div>
      </label>
      <p class="photo-hint">Adicione uma foto de perfil para os clientes identificarem você</p>
    </div>

    <!-- Descrição profissional -->
    <div class="field-group">
      <label class="field-label-light">Descrição profissional</label>
      <textarea class="field-input-light field-textarea" id="inp-descricao"
                placeholder="Descreva seus serviços, experiência e diferenciais..." rows="3"></textarea>
    </div>

    <!-- Área de atuação e Categoria (selects populados pela API) -->
    <div class="field-row">
      <div class="field-group" style="flex:1">
        <label class="field-label-light">Área de atuação</label>
        <select class="field-input-light" id="inp-area">
          <option value="">Carregando...</option>
        </select>
      </div>
      <div class="field-group" style="flex:1">
        <label class="field-label-light">Categoria</label>
        <select class="field-input-light" id="inp-categoria">
          <option value="">Carregando...</option>
        </select>
      </div>
    </div>

    <!-- Endereço -->
    <div class="field-row">
      <div class="field-group" style="flex:1">
        <label class="field-label-light">CPF</label>
        <input class="field-input-light" id="inp-cpf" type="text"
               placeholder="000.000.000-00" maxlength="14">
      </div>
      <div class="field-group" style="flex:1">
        <label class="field-label-light">CEP</label>
        <input class="field-input-light" id="inp-cep" type="text"
               placeholder="00000-000" maxlength="9">
      </div>
    </div>

    <div class="field-row">
      <div class="field-group" style="flex:2">
        <label class="field-label-light">Endereço</label>
        <input class="field-input-light" id="inp-end" type="text" placeholder="Rua / Av.">
      </div>
      <div class="field-group" style="flex:0 0 80px">
        <label class="field-label-light">N°</label>
        <input class="field-input-light" id="inp-num" type="text" placeholder="000">
      </div>
    </div>

    <div class="field-row">
      <div class="field-group" style="flex:1">
        <label class="field-label-light">Cidade</label>
        <input class="field-input-light" id="inp-cidade" type="text" placeholder="Sua cidade">
      </div>
      <div class="field-group" style="flex:0 0 90px">
        <label class="field-label-light">Estado</label>
        <select class="field-input-light" id="inp-estado">
          <option value="">UF</option>
          <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
          <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
          <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
          <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
          <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
          <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
          <option>SP</option><option>SE</option><option>TO</option>
        </select>
      </div>
    </div>

  </div>
</div>

<script src="/assests/js/auth/auth.js"></script>
<script src="/assests/js/cadastro-prestador/cadastro-prestador.js"></script>
</body>
</html>
